<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNS 한 줄 브랜딩 카드 생성기</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.23.2/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box}
body{margin:0;padding:0;background:#0D1117;font-family:'Pretendard Variable',Pretendard,-apple-system,sans-serif;min-height:100vh}
input,textarea,button{font-family:inherit}
textarea{resize:vertical}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#444;border-radius:2px}
input:focus,textarea:focus{outline:none}
::placeholder{color:#555}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const { useState, useMemo, useCallback } = React;

/* ── Design tokens (dark theme) ─────────────────────── */
const T = {
  bg:     "#0D1117",
  card:   "#161B22",
  card2:  "#21262D",
  border: "#30363D",
  ink:    "#E6EDF3",
  muted:  "#8B949E",
  faint:  "#484F58",
  accent: "#58A6FF",
  accentDim: "rgba(88,166,255,0.12)",
  gold:   "#D29922",
  goldDim:"rgba(210,153,34,0.12)",
  good:   "#3FB950",
  goodDim:"rgba(63,185,80,0.12)",
};

/* ── Steps ───────────────────────────────────────────── */
const STEPS = [
  { id:1, label:"나는 누구인가", sub:"직업·역할·숫자" },
  { id:2, label:"지금 하고 있는 것", sub:"활동·성과·숫자" },
  { id:3, label:"내 메시지", sub:"철학·타겟·차별점" },
  { id:4, label:"브랜딩 카드 생성", sub:"Claude 프롬프트 완성" },
];

const INIT = {
  name:"", brandName:"", role:"", years:"", lifeRole:"",
  doing1:"", doing1period:"", doing2:"", doing2num:"",
  achievement:"",
  target:"", message:"", diff:"", style:"",
};

function setIn(obj, key, val) {
  var next = Object.assign({}, obj);
  next[key] = val;
  return next;
}

/* ── Components ──────────────────────────────────────── */
function F({label, hint, req, children}) {
  return (
    <div style={{marginBottom:18}}>
      <label style={{display:"block",marginBottom:6}}>
        <span style={{fontWeight:600,color:T.ink,fontSize:13}}>{label}</span>
        {req && <span style={{color:T.accent,marginLeft:3}}>*</span>}
        {hint && <span style={{color:T.muted,fontSize:11,marginLeft:8}}>{hint}</span>}
      </label>
      {children}
    </div>
  );
}

const IS = {
  width:"100%", border:"1px solid "+T.border, borderRadius:8,
  padding:"10px 14px", fontSize:13, color:T.ink, background:T.card2,
  lineHeight:1.65, transition:"border-color 0.15s",
};

function TI({val, set, ph}) {
  return (
    <input type="text" value={val}
      onChange={function(e){set(e.target.value);}} placeholder={ph}
      style={IS}
      onFocus={function(e){e.target.style.borderColor=T.accent;}}
      onBlur={function(e){e.target.style.borderColor=T.border;}}
    />
  );
}
function TA({val, set, ph, rows}) {
  return (
    <textarea value={val} rows={rows||3}
      onChange={function(e){set(e.target.value);}} placeholder={ph}
      style={IS}
      onFocus={function(e){e.target.style.borderColor=T.accent;}}
      onBlur={function(e){e.target.style.borderColor=T.border;}}
    />
  );
}

/* example pill */
function Eg({text}) {
  return (
    <span style={{display:"inline-block",background:T.accentDim,color:T.accent,fontSize:11,fontWeight:600,padding:"2px 8px",borderRadius:100,marginRight:6,marginBottom:4,cursor:"default"}}>
      {text}
    </span>
  );
}

/* ── Step screens ────────────────────────────────────── */
function S1({d,u}) {
  return (
    <>
      <div style={{marginBottom:28}}>
        <div style={{color:T.accent,fontWeight:700,fontSize:10,letterSpacing:"0.15em",textTransform:"uppercase",marginBottom:6}}>STEP 01</div>
        <h2 style={{fontWeight:800,fontSize:24,color:T.ink,margin:"0 0 8px",letterSpacing:"-0.02em"}}>나는 누구인가</h2>
        <p style={{color:T.muted,fontSize:13,margin:0,lineHeight:1.7}}>
          가장 임팩트 있는 브랜딩은 <strong style={{color:T.ink}}>"이 사람은 뭐 하는 사람이야?"</strong>를 3초 안에 답하는 겁니다.<br/>
          직업·역할·숫자를 구체적으로 적을수록 카피가 날카로워집니다.
        </p>
      </div>

      <div style={{background:T.card2,border:"1px solid "+T.border,borderRadius:10,padding:14,marginBottom:24}}>
        <div style={{color:T.gold,fontSize:11,fontWeight:700,marginBottom:8}}>✦ 참고 예시 — @bookcreation_ 스타일</div>
        <div style={{color:T.ink,fontSize:13,lineHeight:2}}>
          🌙 밤 9시, 아이들 재우고 시작되는 두 번째 하루<br/>
          📚 HRD 14년차 | 딸둘 아빠 | 전자책 3권<br/>
          ✏️ 하루 500자, 2년째 기록 중<br/>
          ☀️ 매일 1%씩, 결국 다른 사람이 됩니다
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
        <F label="이름 (본명 또는 닉네임)" req>
          <TI val={d.name} set={function(v){u("name",v);}} ph="예: 홍요셉 / 요셉쌤"/>
        </F>
        <F label="브랜드명 (SNS 계정명)" hint="없으면 이름으로">
          <TI val={d.brandName} set={function(v){u("brandName",v);}} ph="예: bookcreation_ / 딸둘아빠"/>
        </F>
      </div>

      <F label="직업·역할 (1~2가지)" req hint="구체적인 직함이나 분야">
        <TI val={d.role} set={function(v){u("role",v);}} ph="예: HRD 교육기획자 / 퍼스널브랜딩 강사 / 마케터"/>
      </F>

      <F label="연차·기간 (숫자 포함)" req hint="이 숫자 하나가 신뢰를 만듭니다">
        <TI val={d.years} set={function(v){u("years",v);}} ph="예: 14년차 / 3년째 / 2022년부터"/>
      </F>

      <F label="라이프 역할 키워드" hint="직업 외에 나를 설명하는 한두 가지">
        <div style={{marginBottom:8}}>
          <Eg text="딸둘 아빠"/><Eg text="워킹맘"/><Eg text="3040 직장인"/>
          <Eg text="야간 대학원생"/><Eg text="부업 N잡러"/><Eg text="늦깎이 창업가"/>
        </div>
        <TI val={d.lifeRole} set={function(v){u("lifeRole",v);}} ph="예: 딸둘 아빠 / 워킹맘 / 퇴근 후 작가"/>
      </F>
    </>
  );
}

function S2({d,u}) {
  return (
    <>
      <div style={{marginBottom:28}}>
        <div style={{color:T.accent,fontWeight:700,fontSize:10,letterSpacing:"0.15em",textTransform:"uppercase",marginBottom:6}}>STEP 02</div>
        <h2 style={{fontWeight:800,fontSize:24,color:T.ink,margin:"0 0 8px",letterSpacing:"-0.02em"}}>지금 하고 있는 것</h2>
        <p style={{color:T.muted,fontSize:13,margin:0,lineHeight:1.7}}>
          "말만 하는 사람"과 "하고 있는 사람"의 차이는 <strong style={{color:T.ink}}>현재진행형 숫자</strong>입니다.<br/>
          기간·횟수·결과물을 구체적으로 적을수록 팔로워가 생깁니다.
        </p>
      </div>

      <F label="지금 꾸준히 하고 있는 것 #1" req hint="기간 포함">
        <TI val={d.doing1} set={function(v){u("doing1",v);}} ph="예: 매일 500자 글쓰기 / 매일 독서 30분 / 주 3회 운동"/>
      </F>
      <F label="얼마나 됐나요?" req hint="숫자로">
        <TI val={d.doing1period} set={function(v){u("doing1period",v);}} ph="예: 2년째 / 730일째 / 6개월째"/>
      </F>

      <F label="지금 하고 있는 것 #2 (선택)" hint="두 번째 활동이 있다면">
        <TI val={d.doing2} set={function(v){u("doing2",v);}} ph="예: 전자책 집필 / 강의 준비 / 포트폴리오 제작"/>
      </F>
      <F label="수치화 가능한 성과·결과물" req hint="숫자가 없으면 설득이 안 됩니다">
        <div style={{marginBottom:8}}>
          <Eg text="전자책 3권"/><Eg text="팔로워 4천"/><Eg text="강의 100회"/>
          <Eg text="수강생 3000명"/><Eg text="블로그 100만뷰"/><Eg text="저서 출간"/>
        </div>
        <TI val={d.achievement} set={function(v){u("achievement",v);}} ph="예: 전자책 3권 출간 / 팔로워 4,000명 / 강의 100차수 기획"/>
      </F>
    </>
  );
}

function S3({d,u}) {
  return (
    <>
      <div style={{marginBottom:28}}>
        <div style={{color:T.accent,fontWeight:700,fontSize:10,letterSpacing:"0.15em",textTransform:"uppercase",marginBottom:6}}>STEP 03</div>
        <h2 style={{fontWeight:800,fontSize:24,color:T.ink,margin:"0 0 8px",letterSpacing:"-0.02em"}}>내 메시지</h2>
        <p style={{color:T.muted,fontSize:13,margin:0,lineHeight:1.7}}>
          팔로우 버튼을 누르는 이유는 정보가 아니라 <strong style={{color:T.ink}}>"이 사람과 함께 성장하고 싶다"</strong>는 감각입니다.<br/>
          나를 팔로우해야 하는 이유를 한 줄로 만들어 봅니다.
        </p>
      </div>

      <F label="내 콘텐츠를 보면 좋을 타겟" req hint="구체적인 사람을 떠올려서">
        <div style={{marginBottom:8}}>
          <Eg text="퇴근 후 뭔가 하고 싶은 직장인"/><Eg text="취업 준비하는 대학생"/>
          <Eg text="부업 시작하려는 30대"/><Eg text="글쓰기 시작하는 초보자"/>
        </div>
        <TI val={d.target} set={function(v){u("target",v);}} ph="예: 육퇴 후 자기계발을 시작하고 싶은 30~40대 직장인"/>
      </F>

      <F label="내가 전달하고 싶은 핵심 메시지 (철학)" req hint="당신 콘텐츠의 관통 주제">
        <TA val={d.message} set={function(v){u("message",v);}} ph="예: 거창한 목표가 없어도 됩니다. 매일 1%씩 달라지면 1년 뒤 완전히 다른 사람이 됩니다. 바쁜 직장인도 할 수 있습니다." rows={3}/>
      </F>

      <F label="나만의 차별점" req hint="비슷한 계정들과 다른 한 가지">
        <TI val={d.diff} set={function(v){u("diff",v);}} ph="예: 이론이 아닌 14년 HRD 현장 + 육아 병행 실전 / 강사·작가·직장인을 동시에 살아내는 솔직한 기록"/>
      </F>

      <F label="글 쓰는 스타일·톤" hint="어떤 분위기로 쓰고 싶나요?">
        <div style={{marginBottom:8}}>
          <Eg text="따뜻하고 진솔한"/><Eg text="직설적이고 실용적인"/>
          <Eg text="감성적인"/><Eg text="전문적이고 신뢰감 있는"/><Eg text="유머 있는"/>
        </div>
        <TI val={d.style} set={function(v){u("style",v);}} ph="예: 따뜻하고 솔직한 / 직설적이고 실용적인 / 전문적이면서 친근한"/>
      </F>
    </>
  );
}

function buildPrompts(d) {
  var name   = d.name || "나";
  var brand  = d.brandName || d.name || "내 계정";
  var role   = d.role || "(직업 미입력)";
  var years  = d.years || "";
  var life   = d.lifeRole || "";
  var doing1 = d.doing1 || "";
  var d1per  = d.doing1period || "";
  var doing2 = d.doing2 || "";
  var ach    = d.achievement || "";
  var target = d.target || "";
  var msg    = d.message || "";
  var diff   = d.diff || "";
  var style  = d.style || "따뜻하고 진솔한";

  var profile =
    "- 이름/브랜드: " + name + (brand && brand!==name ? " / @" + brand : "") + "\n" +
    "- 직업·역할: " + role + (years ? " (" + years + ")" : "") + "\n" +
    (life   ? "- 라이프 역할: " + life + "\n" : "") +
    (doing1 ? "- 현재 진행 중: " + doing1 + (d1per ? " (" + d1per + ")" : "") + "\n" : "") +
    (doing2 ? "- 추가 활동: " + doing2 + "\n" : "") +
    (ach    ? "- 성과·결과물: " + ach + "\n" : "") +
    (target ? "- 타겟: " + target + "\n" : "") +
    (msg    ? "- 핵심 메시지: " + msg + "\n" : "") +
    (diff   ? "- 차별점: " + diff + "\n" : "") +
    "- 글 스타일: " + style;

  var p1 =
    "당신은 한국 SNS 퍼스널 브랜딩 카피라이터입니다.\n" +
    "아래 [프로필]을 기반으로 인스타그램·스레드 프로필 소개글을 만들어주세요.\n\n" +
    "[프로필]\n" + profile + "\n\n" +
    "[출력 형식 — 아래 4가지를 각각 제시]\n\n" +
    "① 인스타그램 바이오 (150자 이내)\n" +
    "   형식: 브랜드 핵심 키워드 | 라이프 역할 / 이모지 + 스토리 한 줄 / 이모지 + 팩트 나열 / 이모지 + 현재진행 / 이모지 + 철학 한 줄\n" +
    "   실제 예시 스타일 참고: 북크리에이션 | 육퇴 후 자기계발 / 🌙 밤 9시, 아이들 재우고 시작되는 두 번째 하루 / 📚 HRD 14년차 | 딸둘 아빠 | 전자책 3권\n\n" +
    "② 스레드 첫 게시물 (300자 이내)\n" +
    "   자기소개 + 이 계정을 팔로우해야 하는 이유를 담은 자기PR 게시물\n\n" +
    "③ 카카오채널 / 오픈채팅 소개글 (200자 이내)\n\n" +
    "④ 링크트리 한 줄 소개 (60자 이내)\n\n" +
    "[작성 규칙]\n" +
    "1. 모든 버전에 [프로필]의 실제 숫자(연차·기간·성과)를 반드시 1개 이상 포함.\n" +
    "2. '성실한', '열정적인', '열심히' 같은 추상어 절대 사용 금지.\n" +
    "3. 각 버전은 수정 없이 바로 붙여넣을 수 있는 완성본으로 제시.\n" +
    "4. 스타일은 '" + style + "' 톤으로 작성.";

  var p2 =
    "당신은 한국 SNS 퍼스널 브랜딩 카피라이터입니다.\n" +
    "아래 [프로필]을 기반으로 인스타그램 릴스·카드뉴스 첫 화면에 쓸 훅(Hook) 문장을 만들어주세요.\n\n" +
    "[프로필]\n" + profile + "\n\n" +
    "[출력 규칙]\n" +
    "1. 훅 문장 10개를 아래 5가지 유형으로 2개씩 제시:\n" +
    "   (A) 공감형: 타겟 독자의 현재 고민을 찌르는 한 문장\n" +
    "   (B) 반전형: '~라고 생각했다면 틀렸다' 구조\n" +
    "   (C) 숫자형: 구체적 숫자로 시작하는 문장\n" +
    "   (D) 질문형: 독자가 멈추게 만드는 질문\n" +
    "   (E) 고백형: 솔직한 실패·경험 고백으로 시작\n" +
    "2. 각 문장은 15~40자 이내.\n" +
    "3. 10개 아래에 '이 중 " + (d.target||"타겟 독자") + "에게 가장 잘 먹힐 TOP 3'를 골라 이유와 함께 제시.";

  var p3 =
    "당신은 한국 SNS 퍼스널 브랜딩 카피라이터입니다.\n" +
    "아래 [프로필]을 기반으로 SNS 자기소개 게시물 3가지 버전을 만들어주세요.\n\n" +
    "[프로필]\n" + profile + "\n\n" +
    "[출력 — 3가지 버전]\n\n" +
    "버전 1: 스토리텔링형 (400~600자)\n" +
    "→ '그때 나는 ~이었다'로 시작하는 내러티브. 변화의 계기와 지금의 모습을 이야기 구조로.\n\n" +
    "버전 2: 팩트 나열형 (200~300자)\n" +
    "→ 불릿(•) 3~5개로 숫자·사실만 임팩트 있게. 인스타 캡션이나 카드뉴스 마지막 장에 적합.\n\n" +
    "버전 3: 한 문장 소개 (60자 이내)\n" +
    "→ 프로필 바이오나 명함 한 줄 소개로 쓸 수 있는 완결된 문장.\n\n" +
    "[공통 규칙]\n" +
    "1. 모든 버전에 [프로필]의 숫자와 고유 키워드를 반드시 포함.\n" +
    "2. 추상어 금지. 구체적 행동·결과로만 표현.\n" +
    "3. 스타일은 '" + style + "' 톤.";

  return [
    {id:"p1", ico:"📸", title:"인스타·스레드 프로필 소개글 4종", usage:"인스타 바이오 / 스레드 첫 게시물 / 카카오채널 소개 / 링크트리 한 줄 — 4가지를 한 번에 받습니다.", tip:"결과물을 바로 붙여넣을 수 있도록 완성본으로 만들어줍니다. 마음에 드는 것을 골라 SNS에 올려보세요.", content:p1},

function completion(d) {
  var checks = [
    ["이름",!!d.name],["직업",!!d.role],["연차",!!d.years],
    ["활동#1",!!d.doing1],["기간",!!d.doing1period],
    ["성과",!!d.achievement],["타겟",!!d.target],
    ["메시지",!!d.message],["차별점",!!d.diff],
  ];
  var ok = checks.filter(function(c){return c[1];}).length;
  var miss = checks.filter(function(c){return !c[1];}).map(function(c){return c[0];});
  return {pct:Math.round(ok/checks.length*100), miss:miss};
}

function hexToRgb(hex) {
  var r = parseInt(hex.slice(1,3),16);
  var g = parseInt(hex.slice(3,5),16);
  var b = parseInt(hex.slice(5,7),16);
  return r+","+g+","+b;
}
